server {
    listen 5805;
    server_name localhost;
    charset utf-8;

    # 本地应用代理
    location /api/hmi-web {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 2048m;
        proxy_pass http://localhost:8088/;
    }

    # 云平台代理（API) cookie域名改写
    location /api/ {
        proxy_pass https://roboxstudio.baai.ac.cn/api/;
        proxy_set_header Host roboxstudio.baai.ac.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ✅ 转发Cookie
        proxy_set_header Cookie $http_cookie;

        # ✅ 改写远程Cookie域名为 localhost
        proxy_cookie_domain baai.ac.cn localhost;
        proxy_cookie_domain roboxstudio.baai.ac.cn localhost;

        # 清理跨域头
        proxy_set_header Origin "";
        proxy_set_header Referer "";

        # 基础配置
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    # 云平台代理（HMI）+ 同步添加cookie改写
    location /hmi/ {
        proxy_pass https://roboxstudio.baai.ac.cn/hmi/;
        proxy_set_header Host roboxstudio.baai.ac.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ✅ 转发Cookie
        proxy_set_header Cookie $http_cookie;

        # ✅ 核心配置
        proxy_cookie_domain baai.ac.cn localhost;
        proxy_cookie_domain roboxstudio.baai.ac.cn localhost;

        # 清理跨域头
        proxy_set_header Origin "";
        proxy_set_header Referer "";

        proxy_ssl_verify off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    # CORS配置（保留你原来的）
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With';
            add_header Access-Control-Allow-Credentials 'true';
            add_header Content-Length 0;
            add_header Content-Type 'text/plain; charset=utf-8';
            return 204;
        }
        add_header Access-Control-Allow-Origin $http_origin;
        add_header Access-Control-Allow-Credentials 'true';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root html;
    }
}
